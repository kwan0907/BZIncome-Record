<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BZ 收入與庫存管理系統</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5}
        .header{background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between}
        .header h1{font-size:20px}
        .nav{background:#fff;display:flex;border-bottom:2px solid #e2e8f0;overflow-x:auto}
        .nav-btn{padding:14px 24px;border:none;background:none;cursor:pointer;font-size:15px;color:#64748b;border-bottom:3px solid transparent;white-space:nowrap;transition:.2s}
        .nav-btn:hover{color:#667eea}
        .nav-btn.active{color:#667eea;border-bottom-color:#667eea;font-weight:600}
        .container{max-width:1200px;margin:0 auto;padding:20px}
        .page{display:none}.page.active{display:block}
        .card{background:#fff;border-radius:12px;padding:24px;margin-bottom:20px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
        .card h2{font-size:18px;margin-bottom:16px;color:#1e293b}
        .stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px;margin-bottom:20px}
        .stat-card{background:#fff;border-radius:12px;padding:20px;box-shadow:0 1px 3px rgba(0,0,0,.1)}
        .stat-card .label{font-size:13px;color:#64748b;margin-bottom:4px}
        .stat-card .value{font-size:28px;font-weight:700;color:#1e293b}
        .stat-card .icon{font-size:32px;float:right}
        .btn{padding:10px 20px;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:.2s}
        .btn-primary{background:#667eea;color:#fff}.btn-primary:hover{background:#5a6fd6}
        .btn-danger{background:#ef4444;color:#fff}.btn-danger:hover{background:#dc2626}
        .btn-success{background:#10b981;color:#fff}.btn-success:hover{background:#059669}
        .btn-sm{padding:6px 12px;font-size:12px}
        .form-group{margin-bottom:14px}
        .form-group label{display:block;font-size:13px;color:#475569;margin-bottom:4px;font-weight:500}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 12px;border:1px solid #d1d5db;border-radius:8px;font-size:14px;transition:.2s}
        .form-group input:focus,.form-group select:focus,.form-group textarea:focus{outline:none;border-color:#667eea;box-shadow:0 0 0 3px rgba(102,126,234,.1)}
        .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
        table{width:100%;border-collapse:collapse}
        th,td{padding:12px;text-align:left;border-bottom:1px solid #e2e8f0;font-size:14px}
        th{background:#f8fafc;font-weight:600;color:#475569}
        tr:hover{background:#f8fafc}
        .modal-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center}
        .modal-overlay.show{display:flex}
        .modal{background:#fff;border-radius:12px;padding:24px;width:90%;max-width:500px;max-height:90vh;overflow-y:auto}
        .modal h3{margin-bottom:16px;font-size:18px}
        .search-bar{padding:10px 14px;border:1px solid #d1d5db;border-radius:8px;width:100%;max-width:300px;font-size:14px;margin-bottom:16px}
        .badge{padding:4px 10px;border-radius:20px;font-size:12px;font-weight:500}
        .badge-green{background:#d1fae5;color:#065f46}
        .badge-red{background:#fee2e2;color:#991b1b}
        .badge-yellow{background:#fef3c7;color:#92400e}
        .flex{display:flex}.flex-between{display:flex;justify-content:space-between;align-items:center}
        .gap-8{gap:8px}.mb-16{margin-bottom:16px}
        .empty-state{text-align:center;padding:40px;color:#94a3b8}
        .empty-state .icon{font-size:48px;margin-bottom:12px}
        @media(max-width:768px){.form-row{grid-template-columns:1fr}.stats-grid{grid-template-columns:1fr 1fr}th,td{padding:8px;font-size:12px}.hide-mobile{display:none}}
    </style>
</head>
<body>

<div class="header">
    <h1>📊 BZ 收入與庫存管理系統</h1>
    <span id="currentDate"></span>
</div>

<div class="nav">
    <button class="nav-btn active" onclick="showPage('dashboard',this)">📈 儀表板</button>
    <button class="nav-btn" onclick="showPage('customers',this)">👥 客戶管理</button>
    <button class="nav-btn" onclick="showPage('products',this)">📦 產品庫存</button>
    <button class="nav-btn" onclick="showPage('sales',this)">💰 銷售記錄</button>
</div>

<div class="container">
    <!-- 儀表板 -->
    <div id="page-dashboard" class="page active">
        <div class="stats-grid">
            <div class="stat-card"><div class="icon">👥</div><div class="label">客戶總數</div><div class="value" id="stat-customers">0</div></div>
            <div class="stat-card"><div class="icon">📦</div><div class="label">產品種類</div><div class="value" id="stat-products">0</div></div>
            <div class="stat-card"><div class="icon">💰</div><div class="label">本月收入</div><div class="value" id="stat-monthly">$0</div></div>
            <div class="stat-card"><div class="icon">📊</div><div class="label">總收入</div><div class="value" id="stat-total">$0</div></div>
        </div>
        <div class="card"><h2>⚠️ 庫存警告（低於5件）</h2><div id="low-stock-list"></div></div>
        <div class="card"><h2>🕐 最近銷售</h2><div id="recent-sales"></div></div>
    </div>

    <!-- 客戶管理 -->
    <div id="page-customers" class="page">
        <div class="card">
            <div class="flex-between mb-16"><h2>👥 客戶管理</h2><button class="btn btn-primary" onclick="openModal('customer')">+ 新增客戶</button></div>
            <input type="text" class="search-bar" placeholder="🔍 搜尋客戶..." oninput="searchCustomers(this.value)">
            <div id="customers-table"></div>
        </div>
    </div>

    <!-- 產品庫存 -->
    <div id="page-products" class="page">
        <div class="card">
            <div class="flex-between mb-16"><h2>📦 產品庫存</h2><button class="btn btn-primary" onclick="openModal('product')">+ 新增產品</button></div>
            <input type="text" class="search-bar" placeholder="🔍 搜尋產品..." oninput="searchProducts(this.value)">
            <div id="products-table"></div>
        </div>
    </div>

    <!-- 銷售記錄 -->
    <div id="page-sales" class="page">
        <div class="card">
            <div class="flex-between mb-16"><h2>💰 銷售記錄</h2><button class="btn btn-primary" onclick="openModal('sale')">+ 新增銷售</button></div>
            <div id="sales-table"></div>
        </div>
    </div>
</div>

<!-- 客戶 Modal -->
<div class="modal-overlay" id="modal-customer">
    <div class="modal">
        <h3 id="customer-modal-title">新增客戶</h3>
        <input type="hidden" id="customer-id">
        <div class="form-group"><label>姓名 *</label><input type="text" id="customer-name" placeholder="客戶姓名"></div>
        <div class="form-row">
            <div class="form-group"><label>電話</label><input type="text" id="customer-phone" placeholder="電話號碼"></div>
            <div class="form-group"><label>Email</label><input type="email" id="customer-email" placeholder="Email"></div>
        </div>
        <div class="form-group"><label>備註</label><textarea id="customer-notes" rows="3" placeholder="備註..."></textarea></div>
        <div class="flex gap-8" style="justify-content:flex-end">
            <button class="btn" onclick="closeModal('customer')" style="background:#e2e8f0">取消</button>
            <button class="btn btn-primary" onclick="saveCustomer()">儲存</button>
        </div>
    </div>
</div>

<!-- 產品 Modal -->
<div class="modal-overlay" id="modal-product">
    <div class="modal">
        <h3 id="product-modal-title">新增產品</h3>
        <input type="hidden" id="product-id">
        <div class="form-group"><label>產品名稱 *</label><input type="text" id="product-name" placeholder="產品名稱"></div>
        <div class="form-row">
            <div class="form-group"><label>售價</label><input type="number" id="product-price" placeholder="0" min="0"></div>
            <div class="form-group"><label>庫存數量</label><input type="number" id="product-stock" placeholder="0" min="0"></div>
        </div>
        <div class="form-group"><label>分類</label><input type="text" id="product-category" placeholder="例如：營養品、護膚品"></div>
        <div class="flex gap-8" style="justify-content:flex-end">
            <button class="btn" onclick="closeModal('product')" style="background:#e2e8f0">取消</button>
            <button class="btn btn-primary" onclick="saveProduct()">儲存</button>
        </div>
    </div>
</div>

<!-- 銷售 Modal -->
<div class="modal-overlay" id="modal-sale">
    <div class="modal">
        <h3>新增銷售記錄</h3>
        <div class="form-row">
            <div class="form-group"><label>客戶 *</label><select id="sale-customer"></select></div>
            <div class="form-group"><label>日期</label><input type="date" id="sale-date"></div>
        </div>
        <div class="form-group"><label>銷售項目</label><div id="sale-items"></div>
            <button class="btn btn-sm" onclick="addSaleItem()" style="background:#e2e8f0;margin-top:8px">+ 新增項目</button>
        </div>
        <div class="form-group"><label>總金額</label><input type="number" id="sale-total" placeholder="0" min="0"></div>
        <div class="form-group"><label>備註</label><textarea id="sale-notes" rows="2" placeholder="備註..."></textarea></div>
        <div class="flex gap-8" style="justify-content:flex-end">
            <button class="btn" onclick="closeModal('sale')" style="background:#e2e8f0">取消</button>
            <button class="btn btn-success" onclick="saveSale()">儲存銷售</button>
        </div>
    </div>
</div>

<script>
const SUPABASE_URL='https://ywsvurcdilrzguxmkmws.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl3c3Z1cmNkaWxyemd1eG1rbXdzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYzNTQ3ODcsImV4cCI6MjA5MTkzMDc4N30.Jkg-9iBuSJx2wH3ptB0XuMmRNU9kxoZzVMI4ed1fufE';
const db=window.supabase.createClient(SUPABASE_URL,SUPABASE_KEY);

let customersData=[],productsData=[],salesData=[];

function showPage(page,btn){
    document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
    document.getElementById('page-'+page).classList.add('active');
    btn.classList.add('active');
    if(page==='dashboard')loadDashboard();
    if(page==='customers')loadCustomers();
    if(page==='products')loadProducts();
    if(page==='sales')loadSales();
}

function openModal(type){document.getElementById('modal-'+type).classList.add('show');if(type==='sale')populateSaleForm()}
function closeModal(type){
    document.getElementById('modal-'+type).classList.remove('show');
    if(type==='customer'){document.getElementById('customer-id').value='';document.getElementById('customer-name').value='';document.getElementById('customer-phone').value='';document.getElementById('customer-email').value='';document.getElementById('customer-notes').value='';document.getElementById('customer-modal-title').textContent='新增客戶'}
    if(type==='product'){document.getElementById('product-id').value='';document.getElementById('product-name').value='';document.getElementById('product-price').value='';document.getElementById('product-stock').value='';document.getElementById('product-category').value='';document.getElementById('product-modal-title').textContent='新增產品'}
}

// 客戶
async function loadCustomers(){
    const{data}=await db.from('customers').select('*').order('created_at',{ascending:false});
    customersData=data||[];renderCustomers(customersData);
}
function renderCustomers(data){
    if(!data.length){document.getElementById('customers-table').innerHTML='<div class="empty-state"><div class="icon">👥</div><p>尚無客戶資料</p></div>';return}
    let h='<table><thead><tr><th>姓名</th><th>電話</th><th class="hide-mobile">Email</th><th class="hide-mobile">備註</th><th>操作</th></tr></thead><tbody>';
    data.forEach(c=>{h+=`<tr><td><strong>${c.name}</strong></td><td>${c.phone||'-'}</td><td class="hide-mobile">${c.email||'-'}</td><td class="hide-mobile">${c.notes||'-'}</td><td><button class="btn btn-sm btn-primary" onclick="editCustomer(${c.id})">編輯</button> <button class="btn btn-sm btn-danger" onclick="deleteCustomer(${c.id})">刪除</button></td></tr>`});
    h+='</tbody></table>';document.getElementById('customers-table').innerHTML=h;
}
function searchCustomers(q){renderCustomers(customersData.filter(c=>c.name.includes(q)||(c.phone&&c.phone.includes(q))))}
async function saveCustomer(){
    const id=document.getElementById('customer-id').value;
    const d={name:document.getElementById('customer-name').value.trim(),phone:document.getElementById('customer-phone').value.trim(),email:document.getElementById('customer-email').value.trim(),notes:document.getElementById('customer-notes').value.trim()};
    if(!d.name){alert('請輸入客戶姓名');return}
    if(id){await db.from('customers').update(d).eq('id',id)}else{await db.from('customers').insert(d)}
    closeModal('customer');loadCustomers();
}
async function editCustomer(id){
    const c=customersData.find(x=>x.id===id);if(!c)return;
    document.getElementById('customer-id').value=c.id;document.getElementById('customer-name').value=c.name;document.getElementById('customer-phone').value=c.phone||'';document.getElementById('customer-email').value=c.email||'';document.getElementById('customer-notes').value=c.notes||'';document.getElementById('customer-modal-title').textContent='編輯客戶';openModal('customer');
}
async function deleteCustomer(id){if(!confirm('確定要刪除此客戶？'))return;await db.from('customers').delete().eq('id',id);loadCustomers()}

// 產品
async function loadProducts(){
    const{data}=await db.from('products').select('*').order('created_at',{ascending:false});
    productsData=data||[];renderProducts(productsData);
}
function renderProducts(data){
    if(!data.length){document.getElementById('products-table').innerHTML='<div class="empty-state"><div class="icon">📦</div><p>尚無產品資料</p></div>';return}
    let h='<table><thead><tr><th>產品名稱</th><th>分類</th><th>售價</th><th>庫存</th><th>操作</th></tr></thead><tbody>';
    data.forEach(p=>{
        let b=p.stock<=0?'badge-red':p.stock<5?'badge-yellow':'badge-green';
        h+=`<tr><td><strong>${p.name}</strong></td><td>${p.category||'-'}</td><td>$${Number(p.price).toLocaleString()}</td><td><span class="badge ${b}">${p.stock}</span></td><td><button class="btn btn-sm btn-primary" onclick="editProduct(${p.id})">編輯</button> <button class="btn btn-sm btn-danger" onclick="deleteProduct(${p.id})">刪除</button></td></tr>`});
    h+='</tbody></table>';document.getElementById('products-table').innerHTML=h;
}
function searchProducts(q){renderProducts(productsData.filter(p=>p.name.includes(q)||(p.category&&p.category.includes(q))))}
async function saveProduct(){
    const id=document.getElementById('product-id').value;
    const d={name:document.getElementById('product-name').value.trim(),price:parseFloat(document.getElementById('product-price').value)||0,stock:parseInt(document.getElementById('product-stock').value)||0,category:document.getElementById('product-category').value.trim()};
    if(!d.name){alert('請輸入產品名稱');return}
    if(id){await db.from('products').update(d).eq('id',id)}else{await db.from('products').insert(d)}
    closeModal('product');loadProducts();
}
async function editProduct(id){
    const p=productsData.find(x=>x.id===id);if(!p)return;
    document.getElementById('product-id').value=p.id;document.getElementById('product-name').value=p.name;document.getElementById('product-price').value=p.price;document.getElementById('product-stock').value=p.stock;document.getElementById('product-category').value=p.category||'';document.getElementById('product-modal-title').textContent='編輯產品';openModal('product');
}
async function deleteProduct(id){if(!confirm('確定要刪除此產品？'))return;await db.from('products').delete().eq('id',id);loadProducts()}

// 銷售
async function loadSales(){
    const{data}=await db.from('transactions').select('*,customers(name)').order('date',{ascending:false});
    salesData=data||[];renderSales(salesData);
}
function renderSales(data){
    if(!data.length){document.getElementById('sales-table').innerHTML='<div class="empty-state"><div class="icon">💰</div><p>尚無銷售記錄</p></div>';return}
    let h='<table><thead><tr><th>日期</th><th>客戶</th><th>項目</th><th>金額</th><th class="hide-mobile">備註</th><th>操作</th></tr></thead><tbody>';
    data.forEach(s=>{
        const cn=s.customers?s.customers.name:'-';
        const items=s.items?s.items.map(i=>i.name+' x'+i.qty).join(', '):'-';
        h+=`<tr><td>${s.date}</td><td>${cn}</td><td>${items}</td><td><strong>$${Number(s.total).toLocaleString()}</strong></td><td class="hide-mobile">${s.notes||'-'}</td><td><button class="btn btn-sm btn-danger" onclick="deleteSale(${s.id})">刪除</button></td></tr>`});
    h+='</tbody></table>';document.getElementById('sales-table').innerHTML=h;
}
function populateSaleForm(){
    document.getElementById('sale-date').value=new Date().toISOString().split('T')[0];
    let o='<option value="">選擇客戶</option>';customersData.forEach(c=>{o+=`<option value="${c.id}">${c.name}</option>`});
    document.getElementById('sale-customer').innerHTML=o;
    document.getElementById('sale-items').innerHTML='';document.getElementById('sale-total').value='';document.getElementById('sale-notes').value='';addSaleItem();
}
function addSaleItem(){
    const c=document.getElementById('sale-items'),d=document.createElement('div');
    d.style.cssText='display:grid;grid-template-columns:2fr 1fr 1fr auto;gap:8px;margin-bottom:8px;align-items:end';
    let po='<option value="">選擇產品</option>';productsData.forEach(p=>{po+=`<option value="${p.id}" data-price="${p.price}">${p.name} ($${p.price})</option>`});
    d.innerHTML=`<div><label style="font-size:12px">產品</label><select class="sale-product" onchange="calcTotal()" style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px">${po}</select></div><div><label style="font-size:12px">數量</label><input type="number" class="sale-qty" value="1" min="1" onchange="calcTotal()" style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px"></div><div><label style="font-size:12px">小計</label><input type="text" class="sale-subtotal" readonly style="width:100%;padding:8px;border:1px solid #d1d5db;border-radius:6px;background:#f8fafc"></div><button onclick="this.parentElement.remove();calcTotal()" style="padding:8px;border:none;background:#fee2e2;border-radius:6px;cursor:pointer">✕</button>`;
    c.appendChild(d);
}
function calcTotal(){
    let t=0;document.querySelectorAll('#sale-items>div').forEach(r=>{
        const s=r.querySelector('.sale-product'),q=parseInt(r.querySelector('.sale-qty').value)||0,o=s.options[s.selectedIndex],p=o?parseFloat(o.dataset.price)||0:0,st=p*q;
        r.querySelector('.sale-subtotal').value='$'+st.toLocaleString();t+=st});
    document.getElementById('sale-total').value=t;
}
async function saveSale(){
    const cid=document.getElementById('sale-customer').value,date=document.getElementById('sale-date').value,total=parseFloat(document.getElementById('sale-total').value)||0,notes=document.getElementById('sale-notes').value.trim();
    if(!cid){alert('請選擇客戶');return}
    const items=[];document.querySelectorAll('#sale-items>div').forEach(r=>{
        const s=r.querySelector('.sale-product'),q=parseInt(r.querySelector('.sale-qty').value)||0;
        if(s.value&&q>0){const p=productsData.find(x=>x.id==s.value);items.push({product_id:parseInt(s.value),name:p?p.name:'',price:p?p.price:0,qty:q})}});
    if(!items.length){alert('請至少新增一個銷售項目');return}
    const{error}=await db.from('transactions').insert({customer_id:parseInt(cid),date,items,total,notes});
    if(error){alert('儲存失敗：'+error.message);return}
    for(const i of items){const p=productsData.find(x=>x.id===i.product_id);if(p)await db.from('products').update({stock:p.stock-i.qty}).eq('id',i.product_id)}
    closeModal('sale');loadSales();loadProducts();
}
async function deleteSale(id){if(!confirm('確定要刪除此銷售記錄？'))return;await db.from('transactions').delete().eq('id',id);loadSales()}

// 儀表板
async function loadDashboard(){
    const[cr,pr,sr]=await Promise.all([db.from('customers').select('*'),db.from('products').select('*'),db.from('transactions').select('*,customers(name)').order('date',{ascending:false})]);
    customersData=cr.data||[];productsData=pr.data||[];salesData=sr.data||[];
    document.getElementById('stat-customers').textContent=customersData.length;
    document.getElementById('stat-products').textContent=productsData.length;
    const ti=salesData.reduce((s,x)=>s+Number(x.total),0);document.getElementById('stat-total').textContent='$'+ti.toLocaleString();
    const now=new Date(),ms=`${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-01`;
    const mi=salesData.filter(s=>s.date>=ms).reduce((s,x)=>s+Number(x.total),0);document.getElementById('stat-monthly').textContent='$'+mi.toLocaleString();
    const ls=productsData.filter(p=>p.stock<5);
    if(!ls.length){document.getElementById('low-stock-list').innerHTML='<p style="color:#94a3b8">✅ 所有產品庫存正常</p>'}
    else{let h='<table><thead><tr><th>產品</th><th>庫存</th></tr></thead><tbody>';ls.forEach(p=>{h+=`<tr><td>${p.name}</td><td><span class="badge ${p.stock<=0?'badge-red':'badge-yellow'}">${p.stock}</span></td></tr>`});h+='</tbody></table>';document.getElementById('low-stock-list').innerHTML=h}
    const rc=salesData.slice(0,5);
    if(!rc.length){document.getElementById('recent-sales').innerHTML='<p style="color:#94a3b8">尚無銷售記錄</p>'}
    else{let h='<table><thead><tr><th>日期</th><th>客戶</th><th>金額</th></tr></thead><tbody>';rc.forEach(s=>{h+=`<tr><td>${s.date}</td><td>${s.customers?s.customers.name:'-'}</td><td><strong>$${Number(s.total).toLocaleString()}</strong></td></tr>`});h+='</tbody></table>';document.getElementById('recent-sales').innerHTML=h}
}

document.getElementById('currentDate').textContent=new Date().toLocaleDateString('zh-TW');
loadDashboard();
</script>
</body>
</html>
